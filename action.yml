name: CI Failure Intelligence
description: AI-powered CI failure analysis — posts structured root cause analysis as PR comments

inputs:
  github-token:
    description: GitHub token for API access and GitHub Models LLM
    required: true
  log-file:
    description: Path to CI log file. If omitted, logs are fetched automatically via GitHub API.
    required: false
    default: ""
  model:
    description: GitHub Models model to use
    required: false
    default: "openai/gpt-4o-mini"

outputs:
  failure-type:
    description: Classified failure type (test_failure, build_error, infra_error, config_error, timeout, unknown)
  confidence:
    description: Analysis confidence level (high, medium, low)
  root-cause:
    description: Root cause summary from LLM analysis

runs:
  using: docker
  image: docker://ghcr.io/alihaidar2950/cifi:v1
  env:
    INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
    INPUT_LOG_FILE: ${{ inputs.log-file }}
    INPUT_MODEL: ${{ inputs.model }}

branding:
  icon: zap
  color: purple
